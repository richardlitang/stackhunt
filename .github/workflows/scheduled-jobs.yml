name: Scheduled Jobs

on:
  schedule:
    # Daily hunt queue processing - 6am UTC
    - cron: '0 6 * * *'
    # QA autopilot cron-safe run - every 6 hours at :30
    - cron: '30 */6 * * *'
    # Daily topic discovery - 7am UTC
    - cron: '0 7 * * *'
    # Daily decision intro backfill - 8:15am UTC
    - cron: '15 8 * * *'

  # Allow manual triggers with job selection
  workflow_dispatch:
    inputs:
      job:
        description: 'Which job to run'
        required: true
        type: choice
        options:
          - hunt-queue
          - qa-autopilot
          - discover-topics
          - decision-intro-backfill

env:
  NODE_VERSION: '20'

jobs:
  # ============================================================
  # DAILY: Process Hunt Queue (6am UTC)
  # Processes pending items from hunt_queue table
  # ============================================================
  hunt-queue:
    name: Process Hunt Queue
    if: github.event.schedule == '0 6 * * *' || github.event.inputs.job == 'hunt-queue'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate required secrets
        run: |
          missing=0
          for key in SUPABASE_URL SUPABASE_SERVICE_ROLE_KEY GEMINI_API_KEY SERPER_API_KEY; do
            if [ -z "${!key}" ]; then
              echo "::error::Missing required secret: $key"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "One or more required secrets are missing for hunt-queue."
            exit 1
          fi
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}

      - name: Recover stale jobs
        run: |
          echo "Checking for stale jobs..."
          node -e "
          const { createClient } = require('@supabase/supabase-js');
          const supabase = createClient(process.env.SUPABASE_URL, process.env.SUPABASE_SERVICE_ROLE_KEY);
          supabase.rpc('recover_stale_hunt_jobs').then(({ data, error }) => {
            if (error) {
              console.error('Error recovering stale jobs:', error);
              process.exit(1);
            }
            console.log('Recovered', data, 'stale jobs');
          });
          "
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Process hunt queue
        run: npm run hunt:batch
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

      - name: Notify on failure
        if: failure()
        run: |
          # Discord notification
          if [ -n "${{ secrets.DISCORD_WEBHOOK_URL }}" ]; then
            curl -X POST -H 'Content-type: application/json' \
              --data '{
                "content": "@here Automation failure!",
                "embeds": [{
                  "title": "Hunt Queue Processing Failed",
                  "description": "The scheduled hunt queue job failed. Check GitHub Actions logs.",
                  "color": 16711680,
                  "fields": [
                    {"name": "Workflow", "value": "scheduled-jobs.yml", "inline": true},
                    {"name": "Job", "value": "hunt-queue", "inline": true}
                  ],
                  "timestamp": "'$(date -u +%Y-%m-%dT%H:%M:%SZ)'"
                }]
              }' \
              ${{ secrets.DISCORD_WEBHOOK_URL }}
          fi
          # Legacy Slack support
          if [ -n "${{ secrets.SLACK_WEBHOOK_URL }}" ]; then
            curl -X POST -H 'Content-type: application/json' \
              --data '{"text":"❌ Hunt queue processing failed. Check GitHub Actions logs."}' \
              ${{ secrets.SLACK_WEBHOOK_URL }}
          fi

  # ============================================================
  # EVERY 6 HOURS: QA Autopilot (cron-safe profile)
  # Recompute quality snapshots, publish safe drafts, queue re-hunts, process queue
  # ============================================================
  qa-autopilot:
    name: QA Autopilot
    if: github.event.schedule == '30 */6 * * *' || github.event.inputs.job == 'qa-autopilot'
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate required secrets
        run: |
          missing=0
          for key in SUPABASE_URL SUPABASE_SERVICE_ROLE_KEY GEMINI_API_KEY SERPER_API_KEY; do
            if [ -z "${!key}" ]; then
              echo "::error::Missing required secret: $key"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "One or more required secrets are missing for qa-autopilot."
            exit 1
          fi
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}

      - name: Run QA autopilot (cron profile)
        run: npm run qa:autopilot:cron
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Notify on failure
        if: failure()
        run: |
          if [ -n "${{ secrets.DISCORD_WEBHOOK_URL }}" ]; then
            curl -X POST -H 'Content-type: application/json' \
              --data '{
                "content": "@here Automation failure!",
                "embeds": [{
                  "title": "QA Autopilot Failed",
                  "description": "Scheduled qa:autopilot:cron failed. Check GitHub Actions logs.",
                  "color": 16711680,
                  "fields": [
                    {"name": "Workflow", "value": "scheduled-jobs.yml", "inline": true},
                    {"name": "Job", "value": "qa-autopilot", "inline": true}
                  ],
                  "timestamp": "'$(date -u +%Y-%m-%dT%H:%M:%SZ)'"
                }]
              }' \
              ${{ secrets.DISCORD_WEBHOOK_URL }}
          fi
          if [ -n "${{ secrets.SLACK_WEBHOOK_URL }}" ]; then
            curl -X POST -H 'Content-type: application/json' \
              --data '{"text":"❌ QA autopilot cron failed. Check GitHub Actions logs."}' \
              ${{ secrets.SLACK_WEBHOOK_URL }}
          fi

  # ============================================================
  # DAILY: Decision Intro Backfill (8:15am UTC)
  # Normalizes review_context decision intro/evidence for published tools
  # ============================================================
  decision-intro-backfill:
    name: Decision Intro Backfill
    if: github.event.schedule == '15 8 * * *' || github.event.inputs.job == 'decision-intro-backfill'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate required secrets
        run: |
          missing=0
          for key in SUPABASE_URL SUPABASE_SERVICE_ROLE_KEY; do
            if [ -z "${!key}" ]; then
              echo "::error::Missing required secret: $key"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "One or more required secrets are missing for decision-intro-backfill."
            exit 1
          fi
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Backfill decision intro
        run: npm run qa:backfill-decision-intro -- --apply --limit=600
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Notify on failure
        if: failure()
        run: |
          if [ -n "${{ secrets.DISCORD_WEBHOOK_URL }}" ]; then
            curl -X POST -H 'Content-type: application/json' \
              --data '{
                "content": "@here Automation failure!",
                "embeds": [{
                  "title": "Decision Intro Backfill Failed",
                  "description": "The scheduled decision intro backfill job failed. Check GitHub Actions logs.",
                  "color": 16711680,
                  "fields": [
                    {"name": "Workflow", "value": "scheduled-jobs.yml", "inline": true},
                    {"name": "Job", "value": "decision-intro-backfill", "inline": true}
                  ],
                  "timestamp": "'$(date -u +%Y-%m-%dT%H:%M:%SZ)'"
                }]
              }' \
              ${{ secrets.DISCORD_WEBHOOK_URL }}
          fi
          if [ -n "${{ secrets.SLACK_WEBHOOK_URL }}" ]; then
            curl -X POST -H 'Content-type: application/json' \
              --data '{"text":"❌ Decision intro backfill failed. Check GitHub Actions logs."}' \
              ${{ secrets.SLACK_WEBHOOK_URL }}
          fi

  # ============================================================
  # DAILY: Topic Discovery (7am UTC)
  # AI-powered discovery of new content opportunities
  # ============================================================
  discover-topics:
    name: Discover Topics
    if: github.event.schedule == '0 7 * * *' || github.event.inputs.job == 'discover-topics'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run topic discovery
        run: npm run discover-topics
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

      - name: Notify on failure
        if: failure()
        run: |
          if [ -n "${{ secrets.DISCORD_WEBHOOK_URL }}" ]; then
            curl -X POST -H 'Content-type: application/json' \
              --data '{
                "embeds": [{
                  "title": "Topic Discovery Failed",
                  "description": "The scheduled topic discovery job failed. Check GitHub Actions logs.",
                  "color": 16711680,
                  "timestamp": "'$(date -u +%Y-%m-%dT%H:%M:%SZ)'"
                }]
              }' \
              ${{ secrets.DISCORD_WEBHOOK_URL }}
          fi

  # ============================================================
  # DAILY: Verify Affiliate Links (3am UTC)
  # HTTP HEAD requests to check link health
  # ============================================================
  verify-affiliates:
    name: Verify Affiliate Links
    if: false # disabled per request; keep job for reference
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify affiliate links
        run: npm run verify-affiliates
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

  # ============================================================
  # WEEKLY: Verify User Corrections (Sunday 2am UTC)
  # AI verification of user-submitted corrections
  # Only runs if 50+ pending OR oldest > 30 days
  # ============================================================
  verify-corrections:
    name: Verify Corrections
    if: false # disabled per request; keep job for reference
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run corrections verification
        run: npm run verify-corrections
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

      - name: Notify on failure
        if: failure()
        run: |
          if [ -n "${{ secrets.DISCORD_WEBHOOK_URL }}" ]; then
            curl -X POST -H 'Content-type: application/json' \
              --data '{
                "embeds": [{
                  "title": "Corrections Verification Failed",
                  "description": "The weekly corrections verification job failed. Check GitHub Actions logs.",
                  "color": 16711680,
                  "timestamp": "'$(date -u +%Y-%m-%dT%H:%M:%SZ)'"
                }]
              }' \
              ${{ secrets.DISCORD_WEBHOOK_URL }}
          fi
