name: Docs Hygiene

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: '30 3 * * 1'
  workflow_dispatch:

jobs:
  check-docs:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate docs harness
        run: ./scripts/agent_loop.sh

      - name: Upload docs hygiene artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docs-hygiene-artifacts
          path: |
            docs/generated/doc-gardener-report.md
            docs/plans/active/doc-gardening.md
            docs/QUALITY_SCORE.md
          retention-days: 14
