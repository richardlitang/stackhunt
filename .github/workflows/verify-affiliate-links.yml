name: Verify Affiliate Links

# Run daily at 3:00 AM UTC
on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  verify-links:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install tsx globally
        run: npm install -g tsx

      - name: Run affiliate link verification
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: tsx scripts/verify-affiliate-links.ts

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const issue_number = process.env.GITHUB_ISSUE_NUMBER || '1';
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: parseInt(issue_number),
              body: '🚨 Affiliate link verification failed. Check workflow logs for details.'
            });
