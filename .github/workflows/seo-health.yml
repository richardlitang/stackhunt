name: SEO Health

on:
  schedule:
    - cron: '15 5 * * *'
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  SITE_URL: 'https://stackhunt.io'

jobs:
  sitemap-health:
    name: Sitemap Health Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate sitemap endpoints
        run: npm run qa:seo:sitemaps
        env:
          SITE_URL: ${{ env.SITE_URL }}
